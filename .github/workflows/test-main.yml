name: test-main

on:
  push:
    branches: [main]

# PR and main test jobs share one Neon test database (see tests/setup/global.ts).
# Serialize them into a single global concurrency group so one run's resetDb
# `truncate ... cascade` can't wipe another in-flight run's seed data mid-test
# (which surfaces as FK-constraint violations). Don't cancel an in-progress run.
concurrency:
  group: shared-test-db
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test:unit

      - name: Integration tests
        run: pnpm test:integration
        env:
          TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          TEST_PRIVATE_KEY: ${{ secrets.TEST_PRIVATE_KEY }}

  # Only the e2e job needs the browsers, so the Playwright container lives here
  # rather than on `test` (which runs typecheck/lint/unit and would otherwise
  # pull the ~2GB image for nothing). The container ships the browsers baked in,
  # sidestepping the `playwright install` download that deterministically hangs
  # on the current runner image. Waits for `test` so it never resets the shared
  # test DB while the integration step is still using it.
  e2e:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 25
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # If VERCEL_PREVIEW_URL is configured as a repository secret, E2E runs
      # against the Vercel preview (matches the spec). Otherwise fall back to
      # a locally-built server so the workflow stays self-contained.
      - name: Resolve E2E base URL
        id: baseurl
        env:
          VERCEL_PREVIEW_URL: ${{ secrets.VERCEL_PREVIEW_URL }}
        run: |
          if [ -n "$VERCEL_PREVIEW_URL" ]; then
            echo "url=$VERCEL_PREVIEW_URL" >> "$GITHUB_OUTPUT"
            echo "local=false" >> "$GITHUB_OUTPUT"
          else
            echo "url=http://localhost:3000" >> "$GITHUB_OUTPUT"
            echo "local=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        if: steps.baseurl.outputs.local == 'true'
        run: pnpm build
        env:
          NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID:
            ${{ secrets.NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID }}
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: http://localhost:3000
          COUNCIL_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}

      # Server output is captured to a file: a backgrounded step process loses
      # its stdout once the step ends, so crashes and request errors were
      # previously invisible. The log is probed and uploaded on failure below.
      - name: Start server
        if: steps.baseurl.outputs.local == 'true'
        run: pnpm start > server.log 2>&1 &
        env:
          NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID:
            ${{ secrets.NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: http://localhost:3000
          COUNCIL_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}

      - name: Wait for server
        if: steps.baseurl.outputs.local == 'true'
        run: pnpm exec wait-on http://localhost:3000 --timeout 60000

      - name: E2E tests
        run: pnpm test:e2e
        env:
          TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          TEST_PRIVATE_KEY: ${{ secrets.TEST_PRIVATE_KEY }}
          E2E_BASE_URL: ${{ steps.baseurl.outputs.url }}

      - name: Live smoke tests
        run: pnpm test:live
        env:
          TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          TEST_PRIVATE_KEY: ${{ secrets.TEST_PRIVATE_KEY }}
          E2E_BASE_URL: ${{ steps.baseurl.outputs.url }}

      # Recent flakes ended with page navigations hanging until the test
      # timeout, with no way to tell whether the server or the browser was
      # stuck. Probing from a separate client settles that: if curl also
      # hangs the server is wedged; if curl answers the problem is browser-side.
      - name: Probe server on failure
        if: failure() && steps.baseurl.outputs.local == 'true'
        run: |
          for url in \
            "http://localhost:3000/flow-councils/application/11155420/0xe2e0e2e0e2e0e2e0e2e0e2e0e2e0e2e0e2e0e2e0" \
            "http://localhost:3000/api/flow-council/projects?managerAddress=0x0000000000000000000000000000000000000001" \
            "http://localhost:3000/"; do
            echo "== $url"
            curl -m 10 -s -o /dev/null -w "status=%{http_code} time=%{time_total}s\n" "$url" \
              || echo "probe failed (timeout or connection refused)"
          done
          echo "== server.log (last 200 lines)"
          tail -200 server.log || true

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload server log on failure
        if: failure() && steps.baseurl.outputs.local == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: server-log
          path: server.log
          retention-days: 7
